server:
  port: 8082

spring:
  application:
    name: profile-service

  datasource:
    url: jdbc:postgresql://localhost:5432/social_profile_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html